<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情绪推荐系统</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .container {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 20px 60px rgba(0,0,0,.15);
    padding: 40px 32px;
    max-width: 480px;
    width: 100%;
  }
  h1 {
    text-align: center;
    font-size: 24px;
    color: #333;
    margin-bottom: 8px;
  }
  .subtitle {
    text-align: center;
    color: #888;
    font-size: 14px;
    margin-bottom: 32px;
  }
  .form-group {
    margin-bottom: 24px;
  }
  .form-group label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #555;
    margin-bottom: 10px;
  }
  .option-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .option-group input[type="radio"] { display: none; }
  .option-group .option {
    flex: 1;
    min-width: 80px;
    text-align: center;
    padding: 12px 8px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    cursor: pointer;
    font-size: 15px;
    color: #666;
    transition: all .2s;
    user-select: none;
    background: #fafafa;
  }
  .option-group .option:hover { border-color: #667eea; background: #f0f0ff; }
  .option-group input[type="radio"]:checked + .option {
    border-color: #667eea;
    background: #667eea;
    color: #fff;
  }
  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 17px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff;
  }
  .btn:hover { opacity: .9; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn:disabled {
    opacity: .6;
    cursor: not-allowed;
    transform: none;
  }
  .spinner {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 3px solid rgba(255,255,255,.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error {
    background: #fff0f0;
    border: 1px solid #ffc0c0;
    color: #c00;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    margin-top: 16px;
    display: none;
  }
  .results { margin-top: 24px; }
  .results-title {
    font-size: 16px;
    font-weight: 600;
    color: #333;
    margin-bottom: 12px;
  }
  .card {
    border: 1px solid #eee;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    transition: all .2s;
  }
  .card:hover { border-color: #667eea; box-shadow: 0 2px 12px rgba(102,126,234,.1); }
  .card h3 { font-size: 16px; color: #333; margin-bottom: 6px; }
  .card p { font-size: 14px; color: #777; line-height: 1.5; }
  .card .meta { margin-top: 8px; font-size: 13px; color: #999; }
  .card .meta span { margin-right: 12px; }
  .empty-state {
    text-align: center;
    color: #bbb;
    padding: 40px 0;
    font-size: 14px;
  }
  @media (max-width: 480px) {
    .container { padding: 24px 16px; }
    h1 { font-size: 20px; }
    .option-group .option { min-width: 70px; padding: 10px 6px; font-size: 14px; }
    .btn { font-size: 15px; padding: 12px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>✨ 情绪推荐</h1>
  <p class="subtitle">根据你的心情和精力，推荐合适的活动</p>

  <div class="form-group">
    <label>你的情绪</label>
    <div class="option-group">
      <input type="radio" name="mood" id="mood-happy" value="开心">
      <label class="option" for="mood-happy">😊 开心</label>
      <input type="radio" name="mood" id="mood-tired" value="疲惫">
      <label class="option" for="mood-tired">😫 疲惫</label>
      <input type="radio" name="mood" id="mood-anxious" value="焦虑">
      <label class="option" for="mood-anxious">😰 焦虑</label>
    </div>
  </div>

  <div class="form-group">
    <label>你的精力</label>
    <div class="option-group">
      <input type="radio" name="energy" id="energy-high" value="高">
      <label class="option" for="energy-high">⚡ 高</label>
      <input type="radio" name="energy" id="energy-mid" value="中">
      <label class="option" for="energy-mid">🌿 中</label>
      <input type="radio" name="energy" id="energy-low" value="低">
      <label class="option" for="energy-low">🛋️ 低</label>
    </div>
  </div>

  <button class="btn" id="submitBtn" onclick="getRecommend()">获取推荐</button>

  <div class="error" id="errorMsg"></div>

  <div class="results" id="results" style="display:none">
    <div class="results-title">推荐活动</div>
    <div id="cards"></div>
  </div>
</div>

<script>
const API_URL = 'http://localhost:3001/api/recommend';

async function getRecommend() {
  const mood = document.querySelector('input[name="mood"]:checked');
  const energy = document.querySelector('input[name="energy"]:checked');
  const errorEl = document.getElementById('errorMsg');
  const resultsEl = document.getElementById('results');
  const cardsEl = document.getElementById('cards');
  const btn = document.getElementById('submitBtn');

  errorEl.style.display = 'none';
  resultsEl.style.display = 'none';

  if (!mood || !energy) {
    showError('请选择情绪和精力');
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>获取中...';

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ mood: mood.value, energy: energy.value })
    });

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error || `请求失败 (${res.status})`);
    }

    const data = await res.json();
    const items = data.recommendations || [];

    if (items.length === 0) {
      cardsEl.innerHTML = '<div class="empty-state">没有找到匹配的推荐活动</div>';
    } else {
      cardsEl.innerHTML = items.map(item => `
        <div class="card">
          <h3>${escapeHtml(item.name)}</h3>
          <p>${escapeHtml(item.description)}</p>
          <div class="meta">
            ${item.duration ? '<span>⏱ ' + escapeHtml(item.duration) + '</span>' : ''}
            <span>🏷️ ' + {'开心':'😊','疲惫':'😫','焦虑':'😰'}[item.mood] || item.mood + '</span>
            <span>⚡ ' + item.energy + '</span>
          </div>
        </div>
      `).join('');
    }

    resultsEl.style.display = 'block';
  } catch (err) {
    showError(err.message || '网络错误，请检查后端服务是否启动');
  } finally {
    btn.disabled = false;
    btn.textContent = '获取推荐';
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
